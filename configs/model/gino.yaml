_target_: neuralop.models.gino.GINO

in_channels: 3
out_channels: 1
gno_coord_dim: 2
gno_embed_channels: 16
gno_embed_max_positions: 600
gno_use_open3d: False

# --- RESTORED RADIUS ---
in_gno_radius: 0.1
out_gno_radius: 0.1

in_gno_transform_type: linear
out_gno_transform_type: linear

# --- RESTORED MLP DEPTH ---
in_gno_channel_mlp_hidden_layers: [4, 256, 512, 256, 3]
out_gno_channel_mlp_hidden_layers: [128, 512, 1024, 512, 64]
out_gno_tanh: None

fno_n_modes: [15, 15]
fno_hidden_channels: 64

# --- CAPACITY FIXES ---
fno_lifting_channel_ratio: 4    # 64 * 4 = 256 (Matches original)
projection_channel_ratio: 4     # 64 * 4 = 256 (Matches original - WAS 1)

fno_n_layers: 4
fno_use_channel_mlp: True

# --- ARCHITECTURE FIXES ---
fno_norm: group_norm            # Reverted from instance_norm
fno_ada_in_features: 8
fno_rank: 0.8
fno_channel_mlp_expansion: 0.5

# --- CRITICAL: REVERT TUCKER ---
fno_implementation: factorized  # Reverted from 'reconstructed'
fno_factorization: null         # Reverted from 'tucker'
fno_channel_mlp_skip: soft-gating # Reverted from 'linear' (Original default was likely soft-gating)

